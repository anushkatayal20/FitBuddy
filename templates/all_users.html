<!DOCTYPE html>
<html>

<head>
<title>All Users</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="result-box">

<h1>All Users</h1>

<table border="1" cellpadding="10">

<tr>
<th>Name</th>
<th>Age</th>
<th>Weight</th>
<th>Goal</th>
<th>Intensity</th>
</tr>

{% for user in users %}
<tr>
<td>{{ user.name }}</td>
<td>{{ user.age }}</td>
<td>{{ user.weight }}</td>
<td>{{ user.goal }}</td>
<td>{{ user.intensity }}</td>
</tr>
{% endfor %}

</table>

<br>

<a href="/">Back</a>

</div>

</body>
</html>
